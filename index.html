<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nokia Snake Game - Authentic Edition</title>
    <style>
        :root {
            --nokia-green: #9ead86;
            --nokia-dark: #2b3324;
            --nokia-light: #c4d1af;
            --nokia-border: #4a543f;
            --pixel-size: 4px;
        }

        @font-face {
            font-family: 'Nokia';
            src: url('https://fonts.cdnfonts.com/s/14873/nokiafc22.woff') format('woff');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #1a1b18;
            color: var(--nokia-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
        }

        /* Phone frame look */
        .phone-frame {
            background: #2a2c27;
            padding: 30px 15px 50px;
            border-radius: 40px;
            border: 8px solid #3d4038;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 420px;
            width: 100%;
            position: relative;
        }

        .phone-frame::before {
            content: "NOKIA";
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #555;
            font-weight: bold;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .screen {
            background: var(--nokia-green);
            border: 10px solid #111;
            padding: 5px;
            position: relative;
            overflow: hidden;
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
        }

        .container {
            text-align: center;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        h1 {
            font-family: 'Nokia', monospace;
            font-size: 2.5rem;
            margin-top: 20px;
            letter-spacing: 2px;
            color: var(--nokia-dark);
        }

        /* High Fidelity CSS Pixel Art Snake */
        .snake-splash-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .pixel-snake {
            width: 80px;
            height: 80px;
            position: relative;
            /* Head and body segments using box shadows */
            background: var(--nokia-dark);
            box-shadow:
                20px 0 0 var(--nokia-dark), 40px 0 0 var(--nokia-dark),
                40px 20px 0 var(--nokia-dark), 40px 40px 0 var(--nokia-dark),
                20px 40px 0 var(--nokia-dark), 0 40px 0 var(--nokia-dark),
                0 60px 0 var(--nokia-dark), 0 80px 0 var(--nokia-dark),
                20px 80px 0 var(--nokia-dark), 40px 80px 0 var(--nokia-dark),
                60px 80px 0 var(--nokia-dark);
            animation: slither 2s infinite steps(4);
        }

        @keyframes slither {

            0%,
            100% {
                transform: translate(-10px, 0);
            }

            50% {
                transform: translate(10px, 0);
            }
        }

        .menu-footer {
            padding-bottom: 20px;
        }

        .play-btn {
            background: var(--nokia-dark);
            color: var(--nokia-green);
            border: none;
            padding: 12px 24px;
            font-family: 'Nokia', monospace;
            font-size: 1.2rem;
            cursor: pointer;
            width: 80%;
            transition: opacity 0.2s;
        }

        .play-btn:active {
            opacity: 0.7;
        }

        .settings-link {
            font-size: 0.8rem;
            margin-top: 10px;
            text-decoration: underline;
            cursor: pointer;
        }

        #settingsScreen {
            display: none;
            padding: 10px;
            text-align: left;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-family: 'Nokia', monospace;
            font-size: 0.9rem;
        }

        select {
            background: transparent;
            border: 1px solid var(--nokia-dark);
            color: var(--nokia-dark);
            font-family: inherit;
        }

        /* Game UI */
        #gameView {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            font-family: 'Nokia', monospace;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--nokia-dark);
            padding-bottom: 2px;
            margin-bottom: 5px;
        }

        #gameCanvas {
            width: 100%;
            flex-grow: 1;
            background: var(--nokia-green);
            touch-action: none;
            image-rendering: pixelated;
        }

        /* Authentic Game Over */
        #gameOverOverlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--nokia-green);
            z-index: 10;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #gameOverOverlay h2 {
            font-family: 'Nokia', monospace;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .final-score {
            font-family: 'Nokia', monospace;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        /* Keypad controls */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 25px;
            justify-items: center;
        }

        .key {
            width: 50px;
            height: 40px;
            background: #444;
            border-radius: 10px;
            border-bottom: 3px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .key:active {
            transform: translateY(2px);
            border-bottom-width: 1px;
        }

        /* Arrow mapping */
        .key.up {
            grid-column: 2;
            grid-row: 1;
        }

        .key.left {
            grid-column: 1;
            grid-row: 2;
        }

        .key.right {
            grid-column: 3;
            grid-row: 2;
        }

        .key.down {
            grid-column: 2;
            grid-row: 2;
        }

        .key.center {
            grid-column: 2;
            grid-row: 2;
            background: #555;
            visibility: hidden;
        }

        @media (min-width: 768px) {
            .keypad {
                display: grid;
            }
        }
    </style>
</head>

<body>
    <div class="phone-frame">
        <div class="screen">
            <!-- Menu Screen -->
            <div class="container" id="menuScreen">
                <h1>SNAKE</h1>
                <div class="snake-splash-container">
                    <div class="pixel-snake"></div>
                </div>
                <div class="menu-footer">
                    <button class="play-btn" id="playBtn">Play</button>
                    <div class="settings-link" id="settingsBtn">Settings</div>
                </div>
            </div>

            <!-- Settings Screen -->
            <div class="container" id="settingsScreen">
                <h2 style="font-family: 'Nokia'; margin-bottom: 20px;">Settings</h2>
                <div class="setting-row">
                    <span>Level</span>
                    <select id="levelSelect">
                        <option value="classic">Classic</option>
                        <option value="teleport">Teleport</option>
                        <option value="reverse">Inverted</option>
                        <option value="walls">Obstacles</option>
                    </select>
                </div>
                <div class="setting-row">
                    <span>Speed</span>
                    <select id="speedSelect">
                        <option value="easy">Normal</option>
                        <option value="medium" selected>Fast</option>
                        <option value="impossible">Legendary</option>
                    </select>
                </div>
                <button class="play-btn" id="backToMenuBtn" style="margin-top: auto;">Back</button>
            </div>

            <!-- Game View -->
            <div id="gameView">
                <div class="game-header">
                    <span id="scoreVal">0</span>
                    <span id="highScore">0</span>
                </div>
                <canvas id="gameCanvas" width="300" height="300"></canvas>
            </div>

            <!-- Authentic Game Over Overlay -->
            <div id="gameOverOverlay">
                <h2>Game over!</h2>
                <div class="final-score">Score: <span id="finalScoreVal">0</span></div>
                <button class="play-btn" id="restartBtn">Continue</button>
            </div>
        </div>

        <!-- Physical Keypad Emulation -->
        <div class="keypad">
            <div></div> <!-- Spacer -->
            <div class="key up" id="ctrlUp">2</div>
            <div></div> <!-- Spacer -->
            <div class="key left" id="ctrlLeft">4</div>
            <div class="key down" id="ctrlDown">8</div>
            <div class="key right" id="ctrlRight">6</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreVal');
        const highScoreEl = document.getElementById('highScore');
        const menuScreen = document.getElementById('menuScreen');
        const settingsScreen = document.getElementById('settingsScreen');
        const gameView = document.getElementById('gameView');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreVal = document.getElementById('finalScoreVal');

        const gridSize = 15;
        let tileCount = 20; // 300 / 15

        let snake = [];
        let food = { x: 5, y: 5 };
        let dx = 1;
        let dy = 0;
        let nextDx = 1;
        let nextDy = 0;
        let score = 0;
        let highScore = localStorage.getItem('nokiaSnakeHighScore') || 0;
        let gameRunning = false;
        let level = 'classic';
        let speed = 100;
        let gameLoop = null;

        const obstacles = [
            { x: 5, y: 5 }, { x: 6, y: 5 }, { x: 5, y: 6 },
            { x: 14, y: 14 }, { x: 15, y: 14 }, { x: 14, y: 15 }
        ];

        highScoreEl.textContent = highScore;

        // --- Event Listeners ---
        document.getElementById('playBtn').addEventListener('click', initGame);
        document.getElementById('restartBtn').addEventListener('click', () => {
            gameOverOverlay.style.display = 'none';
            menuScreen.style.display = 'flex';
        });
        document.getElementById('settingsBtn').addEventListener('click', () => {
            menuScreen.style.display = 'none';
            settingsScreen.style.display = 'flex';
        });
        document.getElementById('backToMenuBtn').addEventListener('click', () => {
            settingsScreen.style.display = 'none';
            menuScreen.style.display = 'flex';
        });

        // Keyboard
        window.addEventListener('keydown', e => {
            if (!gameRunning) return;
            if (e.key === 'ArrowUp') setDir(0, -1);
            if (e.key === 'ArrowDown') setDir(0, 1);
            if (e.key === 'ArrowLeft') setDir(-1, 0);
            if (e.key === 'ArrowRight') setDir(1, 0);
        });

        // Keypad buttons
        const attachKey = (id, nx, ny) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); setDir(nx, ny); });
            el.addEventListener('mousedown', () => setDir(nx, ny));
        };
        attachKey('ctrlUp', 0, -1);
        attachKey('ctrlDown', 0, 1);
        attachKey('ctrlLeft', -1, 0);
        attachKey('ctrlRight', 1, 0);

        // Swipe
        let tX = 0, tY = 0;
        canvas.addEventListener('touchstart', e => { tX = e.touches[0].clientX; tY = e.touches[0].clientY; }, { passive: false });
        canvas.addEventListener('touchend', e => {
            const dX = e.changedTouches[0].clientX - tX, dY = e.changedTouches[0].clientY - tY;
            if (Math.abs(dX) > Math.abs(dY)) { if (Math.abs(dX) > 20) setDir(dX > 0 ? 1 : -1, 0); }
            else { if (Math.abs(dY) > 20) setDir(0, dY > 0 ? 1 : -1); }
        }, { passive: false });

        function setDir(nx, ny) {
            if (level === 'reverse') { nx = -nx; ny = -ny; }
            if (nx !== 0 && dx !== -nx) { nextDx = nx; nextDy = 0; }
            else if (ny !== 0 && dy !== -ny) { nextDx = 0; nextDy = ny; }
        }

        function initGame() {
            level = document.getElementById('levelSelect').value;
            const sChoice = document.getElementById('speedSelect').value;
            speed = sChoice === 'easy' ? 120 : (sChoice === 'medium' ? 80 : 50);

            score = 0; scoreEl.textContent = '0';
            dx = 1; dy = 0; nextDx = 1; nextDy = 0;
            snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
            spawnFood();

            menuScreen.style.display = 'none';
            gameView.style.display = 'flex';
            gameRunning = true;
            if (gameLoop) clearTimeout(gameLoop);
            loop();
        }

        function loop() {
            if (!gameRunning) return;
            update(); draw();
            gameLoop = setTimeout(loop, speed);
        }

        function spawnFood() {
            let v = false;
            while (!v) {
                food = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
                v = !snake.some(s => s.x === food.x && s.y === food.y);
                if (level === 'walls' && obstacles.some(o => o.x === food.x && o.y === food.y)) v = false;
            }
        }

        function update() {
            dx = nextDx; dy = nextDy;
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (level === 'teleport') {
                if (head.x < 0) head.x = tileCount - 1; else if (head.x >= tileCount) head.x = 0;
                if (head.y < 0) head.y = tileCount - 1; else if (head.y >= tileCount) head.y = 0;
            } else if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) return gameOver();

            if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();
            if (level === 'walls' && obstacles.some(o => o.x === head.x && o.y === head.y)) return gameOver();

            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score++; scoreEl.textContent = score;
                if (score > highScore) { highScore = score; highScoreEl.textContent = highScore; localStorage.setItem('nokiaSnakeHighScore', highScore); }
                spawnFood();
            } else snake.pop();
        }

        function draw() {
            ctx.fillStyle = '#9ead86';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Food (classic pixel dot)
            ctx.fillStyle = '#2b3324';
            ctx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4);

            // Obstacles
            if (level === 'walls') {
                obstacles.forEach(o => {
                    ctx.fillRect(o.x * gridSize + 1, o.y * gridSize + 1, gridSize - 2, gridSize - 2);
                    ctx.clearRect(o.x * gridSize + 4, o.y * gridSize + 4, gridSize - 8, gridSize - 8);
                });
            }

            // Snake
            snake.forEach((s, i) => {
                ctx.fillStyle = '#2b3324';
                ctx.fillRect(s.x * gridSize + 1, s.y * gridSize + 1, gridSize - 2, gridSize - 2);
                if (i === 0) {
                    // head detail if desired, but original was solid
                }
            });
        }

        function gameOver() {
            gameRunning = false;
            finalScoreVal.textContent = score;
            gameOverOverlay.style.display = 'flex';
            gameView.style.display = 'none';
        }
    </script>
</body>

</html>
