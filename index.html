<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Snake - Nokia 3310 Edition</title>
    <!-- Importing pixel fonts for that authentic feel -->
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --nokia-blue: #1c3d5a;
            --nokia-silver: #c0c0c0;
            --lcd-green: #94af10;
            --lcd-dark: #2b3a1a;
            --btn-grey: #3a3a3a;
            --btn-dark: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #0f0f0f;
            background-image:
                radial-gradient(#333 1px, transparent 1px),
                linear-gradient(to bottom, #111, #000);
            background-size: 20px 20px, 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'VT323', monospace;
            overflow: hidden;
            color: #fff;
        }

        .nokia-3310 {
            position: relative;
            width: 350px;
            height: 680px;
            background: var(--nokia-blue);
            border-radius: 50px 50px 140px 140px;
            box-shadow:
                0 40px 80px rgba(0, 0, 0, 0.9),
                inset 0 10px 20px rgba(255, 255, 255, 0.1),
                inset 0 -15px 40px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px;
            border: 4px solid #0a1a2a;
        }

        .speaker {
            display: flex;
            gap: 5px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .speaker-hole {
            width: 6px;
            height: 20px;
            background: #0a0a0a;
            border-radius: 3px;
            box-shadow: inset 0 2px 5px #000;
        }

        .screen-bezel {
            width: 290px;
            height: 220px;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 12px;
            box-shadow:
                inset 0 4px 15px #000,
                0 0 0 5px #2c4c6a,
                0 5px 15px rgba(0, 0, 0, 0.5);
            position: relative;
            margin-bottom: 30px;
            border: 1px solid #333;
        }

        .screen-glass {
            width: 100%;
            height: 100%;
            background: var(--lcd-green);
            border: 2px solid #000;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.3);
            animation: lcd-flicker 10s infinite;
        }

        .screen-glass::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, transparent 40%, rgba(0, 0, 0, 0.1) 100%);
            z-index: 20;
            pointer-events: none;
        }

        @keyframes lcd-flicker {

            0%,
            48%,
            52%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.97;
            }
        }

        .screen-glass::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.06) 1px, transparent 1px);
            background-size: 2px 2px;
            pointer-events: none;
            z-index: 10;
        }

        #gameArea {
            width: 100%;
            height: 100%;
            padding: 6px;
            display: flex;
            flex-direction: column;
            color: var(--lcd-dark);
            position: relative;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            border-bottom: 1px solid var(--lcd-dark);
            padding-bottom: 2px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .status-icons {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .battery-icon {
            width: 14px;
            height: 8px;
            border: 1.5px solid var(--lcd-dark);
            position: relative;
        }

        .battery-icon::after {
            content: "";
            position: absolute;
            right: -3px;
            top: 1px;
            width: 2px;
            height: 3px;
            background: var(--lcd-dark);
        }

        .battery-fill {
            height: 100%;
            width: 90%;
            background: var(--lcd-dark);
            transition: width 0.5s;
        }

        .signal-icon {
            display: flex;
            gap: 1.5px;
            align-items: flex-end;
            height: 8px;
        }

        .signal-bar {
            width: 2px;
            background: var(--lcd-dark);
            transition: opacity 0.3s;
        }

        canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        .keypad-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .nav-cluster {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 10px;
            padding: 0 10px;
            align-items: center;
        }

        .nav-key {
            background: var(--btn-grey);
            border: none;
            cursor: pointer;
            box-shadow: 0 5px 0 #1a1a1a, inset 0 2px 3px rgba(255, 255, 255, 0.1);
            color: #ccc;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.05s;
        }

        .btn-c {
            width: 65px;
            height: 45px;
            border-radius: 40% 10% 40% 10%;
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
        }

        .btn-select {
            height: 65px;
            background: var(--nokia-silver);
            border-radius: 35% 35% 50% 50%;
            box-shadow: 0 6px 0 #777, inset 0 2px 4px #fff;
            border: 1px solid #aaa;
        }

        .arrow-keys {
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
        }

        .arrow-key {
            width: 70px;
            height: 35px;
            border-radius: 12px;
            font-size: 1.2rem;
        }

        .num-pad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 0 25px;
        }

        .btn-num {
            height: 48px;
            background: var(--btn-grey);
            color: #fff;
            border-radius: 24px;
            border: none;
            box-shadow: 0 5px 0 #1a1a1a, inset 0 1px 2px rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: inherit;
            cursor: pointer;
        }

        .btn-num span {
            font-size: 0.7rem;
            color: #999;
            margin-top: -2px;
        }

        .nav-key:active,
        .btn-num:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1a1a1a;
        }

        .nav-key.active-glow,
        .btn-num.active-glow {
            background: #555;
            box-shadow: 0 0 15px gold;
        }

        .ui-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .ui-screen.active {
            display: flex;
        }

        .nokia-hands-svg {
            width: 180px;
            height: 100px;
            margin-bottom: 10px;
        }

        .hand-path {
            fill: var(--lcd-dark);
        }

        .hand-l {
            transform: translateX(-100px);
            animation: hand-meet-l 2.8s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hand-r {
            transform: translateX(100px);
            animation: hand-meet-r 2.8s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes hand-meet-l {
            to {
                transform: translateX(0);
            }
        }

        @keyframes hand-meet-r {
            to {
                transform: translateX(0);
            }
        }

        .logo-text {
            font-family: sans-serif;
            font-weight: 900;
            font-size: 3rem;
            letter-spacing: 6px;
            color: var(--lcd-dark);
            opacity: 0;
            animation: fade-in 0.8s 2s forwards;
        }

        @keyframes fade-in {
            to {
                opacity: 1;
            }
        }

        .menu-title {
            font-size: 2.8rem;
            margin-bottom: 5px;
        }

        .menu-options {
            list-style: none;
            font-size: 1.6rem;
            width: 100%;
        }

        .menu-options li {
            padding: 2px 0;
        }

        .menu-options li.selected {
            background: var(--lcd-dark);
            color: var(--lcd-green);
        }

        .record-banner {
            color: #fff;
            background: var(--lcd-dark);
            padding: 2px 10px;
            font-weight: bold;
            margin-bottom: 5px;
            display: none;
        }

        .game-over-title {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="nokia-3310">
        <div class="speaker">
            <div class="speaker-hole"></div>
            <div class="speaker-hole"></div>
            <div class="speaker-hole"></div>
        </div>

        <div class="screen-bezel">
            <div class="screen-glass">
                <div id="gameArea">
                    <!-- Splash Screen -->
                    <div id="splashScreen" class="ui-screen active">
                        <svg class="nokia-hands-svg" viewBox="0 0 200 100">
                            <g class="hand-l">
                                <path class="hand-path" d="M10 50 Q30 30 60 45 L90 55 L80 65 Q50 50 10 50 Z" />
                                <path class="hand-path" d="M85 52 L95 45 Q100 40 105 45 L100 55 Z" />
                            </g>
                            <g class="hand-r">
                                <path class="hand-path" d="M190 50 Q170 30 140 45 L110 55 L120 65 Q150 50 190 50 Z" />
                                <path class="hand-path" d="M115 52 L105 45 Q100 40 95 45 L105 55 Z" />
                            </g>
                        </svg>
                        <div class="logo-text">NOKIA</div>
                    </div>

                    <!-- Menu Screen -->
                    <div id="menuScreen" class="ui-screen">
                        <div class="menu-title">SNAKE II</div>
                        <ul class="menu-options" id="menuList">
                            <li class="selected" data-action="start">START GAME</li>
                            <li data-action="level">LEVEL: <span id="levelVal">1</span></li>
                            <li data-action="settings">WALLS: <span id="wallState">ON</span></li>
                            <li data-action="highscore">HI-SCORE: <span id="menuHighScore">0</span></li>
                        </ul>
                    </div>

                    <!-- Game Screen -->
                    <div id="gamePlayScreen" class="ui-screen">
                        <div id="pauseOverlay"
                            style="display:none; position:absolute; top:45%; left:50%; transform:translate(-50%, -50%); background:var(--lcd-green); padding:5px 15px; border:2px solid var(--lcd-dark); z-index:100; font-weight:bold; font-size:1.5rem;">
                            PAUSED</div>
                        <div class="status-bar">
                            <div class="status-icons">
                                <div class="signal-icon">
                                    <div class="signal-bar" style="height: 20%"></div>
                                    <div class="signal-bar" style="height: 40%"></div>
                                    <div class="signal-bar" style="height: 60%"></div>
                                    <div class="signal-bar" style="height: 80%"></div>
                                </div>
                                <span id="levelName">SNAKE</span>
                            </div>
                            <div class="status-icons">
                                <span id="scoreVal">0</span>
                                <div class="battery-icon">
                                    <div class="battery-fill"></div>
                                </div>
                            </div>
                        </div>
                        <canvas id="gameCanvas"></canvas>
                    </div>

                    <!-- Game Over Screen -->
                    <div id="gameOverScreen" class="ui-screen">
                        <div id="recordLabel" class="record-banner">NEW RECORD!</div>
                        <div class="game-over-title">GAME OVER</div>
                        <div style="font-size: 1.8rem;">Score: <span id="finalScoreVal">0</span></div>
                        <div style="margin-top: 15px; font-size: 1.3rem;">Press <span
                                style="background:#000;color:#94af10;padding:0 4px;">5</span> to Retry</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- AUTHENTIC KEYPAD -->
        <div class="keypad-container">
            <div class="nav-cluster">
                <button class="nav-key btn-c" id="btnC">C</button>
                <button class="nav-key btn-select" id="btnSelect"></button>
                <div class="arrow-keys">
                    <button class="nav-key arrow-key" id="btnUp">▲</button>
                    <button class="nav-key arrow-key" id="btnDown">▼</button>
                </div>
            </div>

            <div class="num-pad">
                <button class="btn-num">1</button>
                <button class="btn-num" id="num2">2 <span>abc</span></button>
                <button class="btn-num">3 <span>def</span></button>
                <button class="btn-num" id="num4">4 <span>ghi</span></button>
                <button class="btn-num" id="num5">5 <span>jkl</span></button>
                <button class="btn-num" id="num6">6 <span>mno</span></button>
                <button class="btn-num">7 <span>pqrs</span></button>
                <button class="btn-num" id="num8">8 <span>tuv</span></button>
                <button class="btn-num">9 <span>wxyz</span></button>
                <button class="btn-num" id="btnStar">*</button>
                <button class="btn-num">0</button>
                <button class="btn-num" id="btnHash">#</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreVal');
        const menuScreen = document.getElementById('menuScreen');
        const gamePlayScreen = document.getElementById('gamePlayScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreVal = document.getElementById('finalScoreVal');

        // Audio System
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, vol = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            move: () => playTone(150, 'square', 0.05, 0.02),
            eat: () => playTone(880, 'square', 0.1, 0.1),
            die: () => {
                playTone(440, 'square', 0.2, 0.1);
                setTimeout(() => playTone(220, 'square', 0.4, 0.1), 200);
            },
            click: () => playTone(600, 'square', 0.05, 0.05),
            start: () => {
                const notes = [440, 493, 523, 587, 659];
                notes.forEach((n, i) => setTimeout(() => playTone(n, 'square', 0.15, 0.05), i * 150));
            },
            record: () => {
                const notes = [523, 659, 783, 1046];
                notes.forEach((n, i) => setTimeout(() => playTone(n, 'square', 0.1, 0.05), i * 100));
            }
        };

        // Game Constants
        const gridW = 30; // 30 pixels wide
        const gridH = 18; // 18 pixels high
        const pixelSize = 4; // Visual size for blocks

        let snake = [];
        let food = { x: 0, y: 0 };
        let dir = { x: 1, y: 0 };
        let nextDir = { x: 1, y: 0 };
        let score = 0;
        let isPaused = false;
        let wallMode = true;
        let currentLevel = 1;
        let gameLoop = null;
        let speed = 150;
        let highScore = localStorage.getItem('nokiaHighScore') || 0;

        function resize() {
            const container = canvas.parentElement;
            canvas.width = gridW * pixelSize;
            canvas.height = gridH * pixelSize;
        }
        window.addEventListener('resize', resize);
        resize();

        // UI State
        let currentScreen = 'splashScreen';

        // Auto transition from splash to menu
        setTimeout(() => {
            if (currentScreen === 'splashScreen') {
                sounds.start();
                showScreen('menuScreen');
            }
        }, 3200);

        function showScreen(id) {
            if (id === 'menuScreen') {
                document.getElementById('menuHighScore').textContent = highScore;
            }
            [document.getElementById('splashScreen'), menuScreen, gamePlayScreen, gameOverScreen].forEach(s => {
                if (s) s.classList.remove('active');
            });
            document.getElementById(id).classList.add('active');
            currentScreen = id;
        }

        // Controls
        function handleInput(key) {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            // Visual button feedback mapping for all buttons
            const btnMap = {
                'ArrowUp': 'btnUp', 'ArrowDown': 'btnDown',
                'ArrowLeft': 'num4', 'ArrowRight': 'num6',
                '5': 'num5', '2': 'num2', '4': 'num4', '6': 'num6', '8': 'num8',
                'Select': 'btnSelect', 'Enter': 'btnSelect', ' ': 'btnSelect',
                'Escape': 'btnC', 'Backspace': 'btnC',
                '#': 'btnHash', '*': 'btnStar'
            };
            const btnId = btnMap[key];
            if (btnId) {
                const el = document.getElementById(btnId);
                if (el) {
                    el.classList.add('active-glow');
                    setTimeout(() => el.classList.remove('active-glow'), 100);
                }
            }

            if (currentScreen === 'splashScreen') {
                sounds.start();
                showScreen('menuScreen');
                return;
            }

            if (currentScreen === 'menuScreen') {
                if (key === 'ArrowUp' || key === 'ArrowDown' || key === '2' || key === '8') {
                    sounds.click();
                    const items = document.querySelectorAll('#menuList li');
                    const selected = document.querySelector('#menuList li.selected');
                    selected.classList.remove('selected');
                    const isUp = key === 'ArrowUp' || key === '2';
                    if (isUp) (selected.previousElementSibling || items[items.length - 1]).classList.add('selected');
                    else (selected.nextElementSibling || items[0]).classList.add('selected');
                }
                if (key === 'Enter' || key === '5' || key === ' ' || key === 'Select') {
                    sounds.click();
                    const selected = document.querySelector('#menuList li.selected');
                    const action = selected.dataset.action;
                    if (action === 'start') {
                        initGame();
                    } else if (action === 'settings') {
                        wallMode = !wallMode;
                        document.getElementById('wallState').textContent = wallMode ? 'ON' : 'OFF';
                    } else if (action === 'level') {
                        currentLevel = (currentLevel % 9) + 1;
                        document.getElementById('levelVal').textContent = currentLevel;
                    }
                }
            } else if (currentScreen === 'gamePlayScreen') {
                if (key === '#' || key === '*' || key === 'p' || key === 'Escape') {
                    isPaused = !isPaused;
                    document.getElementById('pauseOverlay').style.display = isPaused ? 'block' : 'none';
                    sounds.click();
                    return;
                }
                if (isPaused) return;
                if ((key === 'ArrowUp' || key === '2') && dir.y === 0) nextDir = { x: 0, y: -1 };
                if ((key === 'ArrowDown' || key === '8') && dir.y === 0) nextDir = { x: 0, y: 1 };
                if ((key === 'ArrowLeft' || key === '4') && dir.x === 0) nextDir = { x: -1, y: 0 };
                if ((key === 'ArrowRight' || key === '6') && dir.x === 0) nextDir = { x: 1, y: 0 };
            } else if (currentScreen === 'gameOverScreen') {
                if (key === 'Enter' || key === '5' || key === 'Select') {
                    sounds.click();
                    showScreen('menuScreen');
                }
            }
        }

        window.addEventListener('keydown', e => handleInput(e.key));

        const bindBtn = (id, key) => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('mousedown', (e) => { e.preventDefault(); handleInput(key); });
                el.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(key); });
            }
        };

        bindBtn('btnUp', 'ArrowUp');
        bindBtn('btnDown', 'ArrowDown');
        bindBtn('num2', '2');
        bindBtn('num4', '4');
        bindBtn('num5', '5');
        bindBtn('num6', '6');
        bindBtn('num8', '8');
        bindBtn('btnSelect', 'Select');
        bindBtn('btnHash', '#');
        bindBtn('btnStar', '*');
        bindBtn('btnC', 'Escape');

        document.querySelectorAll('.btn').forEach(b => {
            b.addEventListener('mousedown', () => sounds.click());
        });

        // Signal/Battery Simulation
        setInterval(() => {
            const bars = document.querySelectorAll('.signal-bar');
            const down = Math.random() > 0.8;
            bars.forEach((b, i) => b.style.opacity = (down && i > 1) ? '0.2' : '1');
        }, 3000);

        function spawnFood() {
            let valid = false;
            while (!valid) {
                food = {
                    x: Math.floor(Math.random() * gridW),
                    y: Math.floor(Math.random() * gridH)
                };
                valid = !snake.some(s => s.x === food.x && s.y === food.y);
            }
        }

        function initGame() {
            score = 0;
            scoreEl.textContent = '0';
            isPaused = false;
            document.getElementById('pauseOverlay').style.display = 'none';
            // Speed logic: Level 1 (200ms) to Level 9 (40ms)
            speed = 220 - (currentLevel * 20);
            dir = { x: 1, y: 0 };
            nextDir = { x: 1, y: 0 };
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            spawnFood();
            showScreen('gamePlayScreen');
            gameRunning = true;
            lastTime = performance.now();
            requestAnimationFrame(loop);
        }

        function loop(timestamp) {
            if (!gameRunning) return;

            const delta = timestamp - lastTime;
            if (delta > speed) {
                if (!isPaused) update();
                draw();
                lastTime = timestamp;
            }
            requestAnimationFrame(loop);
        }

        function update() {
            dir = nextDir;
            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

            // Collision checks
            if (head.x < 0 || head.x >= gridW || head.y < 0 || head.y >= gridH) {
                if (!wallMode) {
                    if (head.x < 0) head.x = gridW - 1; else if (head.x >= gridW) head.x = 0;
                    if (head.y < 0) head.y = gridH - 1; else if (head.y >= gridH) head.y = 0;
                } else {
                    return die();
                }
            }
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                return die();
            }

            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += (9 + Math.floor(score / 100)); // Bonus points as score grows
                scoreEl.textContent = score;
                if (score > highScore) {
                    if (highScore > 0 && score <= highScore + 10) sounds.record(); // Only play jingle once when record is broken
                    highScore = score;
                    localStorage.setItem('nokiaHighScore', highScore);
                }
                sounds.eat();
                spawnFood();
                // Battery drain simulation
                if (score > 100) document.querySelector('.battery-fill').style.width = '60%';
                if (score > 300) document.querySelector('.battery-fill').style.width = '30%';
                // Increase speed slightly
                if (speed > 60) speed -= 2;
            } else {
                snake.pop();
            }
        }

        function die() {
            gameRunning = false;
            sounds.die();
            finalScoreVal.textContent = score;
            const isNewRecord = (score > 0 && score >= highScore);
            document.getElementById('recordLabel').style.display = isNewRecord ? 'block' : 'none';
            setTimeout(() => showScreen('gameOverScreen'), 1000);
        }

        function draw() {
            // Authentic LCD Ghosting: We don't clear fully, creating a trail
            ctx.fillStyle = 'rgba(148, 175, 16, 0.4)'; // LCD background with alpha
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Food (Classic Pixel Cross)
            ctx.fillStyle = 'rgba(43, 58, 26, 0.8)';
            const fx = food.x * pixelSize;
            const fy = food.y * pixelSize;
            ctx.fillRect(fx + 1, fy, 2, 1);
            ctx.fillRect(fx, fy + 1, 4, 2);
            ctx.fillRect(fx + 1, fy + 3, 2, 1);

            // Draw Snake
            snake.forEach((p, i) => {
                const sx = p.x * pixelSize;
                const sy = p.y * pixelSize;

                if (i === 0) {
                    ctx.fillStyle = '#2b3a1a';
                    // Head with "eyes"
                    ctx.fillRect(sx, sy, pixelSize, pixelSize);
                    ctx.fillStyle = '#94af10';
                    if (dir.x !== 0) {
                        ctx.fillRect(sx + 2, sy, 1, 1);
                        ctx.fillRect(sx + 2, sy + 3, 1, 1);
                    } else {
                        ctx.fillRect(sx, sy + 2, 1, 1);
                        ctx.fillRect(sx + 3, sy + 2, 1, 1);
                    }
                } else {
                    // Body block - slightly more transparent for that LCD blur
                    ctx.fillStyle = `rgba(43, 58, 26, ${Math.max(0.4, 1 - i * 0.05)})`;
                    ctx.fillRect(sx + 0.5, sy + 0.5, pixelSize - 1, pixelSize - 1);
                }
            });
        }

        // Initial Draw
        draw();
    </script>
</body>
