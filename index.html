<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nokia Snake Game - Premium Edition</title>
    <style>
        :root {
            --nokia-green: #7fbf00;
            --nokia-dark: #305000;
            --nokia-light: #d7ff5f;
            --nokia-border: #5b8a00;
            --bg-dark: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Courier New', monospace;
            background: radial-gradient(circle at center, #2c3e10 0%, #000 100%);
            color: var(--nokia-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
            background: var(--nokia-border);
            border: 4px solid var(--nokia-light);
            padding: 20px;
            box-shadow: 0 0 30px rgba(127, 191, 0, 0.3);
            border-radius: 8px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 3px 3px 0px var(--nokia-dark);
            letter-spacing: 5px;
            font-weight: 900;
        }

        .snake-image {
            width: 100%;
            max-width: 350px;
            height: 200px;
            margin: 0 auto 20px;
            border: 3px solid var(--nokia-light);
            background: var(--nokia-green);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            border-radius: 4px;
        }

        /* Pure CSS Retro Snake Decoration */
        .snake-image::before {
            content: "SNAKE";
            font-size: 4rem;
            opacity: 0.1;
            font-weight: bold;
            position: absolute;
        }

        .snake-image .snake-decor {
            position: absolute;
            width: 20px;
            height: 20px;
            background: var(--nokia-dark);
            box-shadow: 22px 0 0 var(--nokia-dark), 44px 0 0 var(--nokia-dark), 44px 22px 0 var(--nokia-dark), 66px 22px 0 var(--nokia-dark);
            top: 50%;
            left: 30%;
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .description {
            font-size: 1rem;
            line-height: 1.4;
            margin: 20px 0;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-left: 4px solid var(--nokia-light);
            text-align: left;
        }

        .settings-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        select {
            background: var(--nokia-light);
            color: #000;
            border: none;
            padding: 8px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        .play-btn {
            background: var(--nokia-light);
            color: #000;
            border: none;
            padding: 18px 36px;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s;
            box-shadow: 0 4px 0 var(--nokia-dark);
        }

        .play-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--nokia-dark);
        }

        #gameView {
            display: none;
            width: 100%;
            max-width: 450px;
            flex-direction: column;
            align-items: center;
        }

        .game-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: var(--nokia-border);
            border: 2px solid var(--nokia-light);
            border-bottom: none;
            font-size: 1.2rem;
            font-weight: bold;
        }

        #gameCanvas {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1/1;
            background: var(--nokia-green);
            border: 4px solid var(--nokia-light);
            touch-action: none;
        }

        /* Mobile Controls */
        .mobile-controls {
            display: none;
            grid-template-areas: 
                ". up ."
                "left . right"
                ". down .";
            gap: 10px;
            margin-top: 20px;
            width: 200px;
        }

        @media (max-width: 768px) {
            .mobile-controls {
                display: grid;
            }
            .container {
                padding: 15px;
            }
            h1 { font-size: 2.2rem; }
        }

        .control-btn {
            width: 60px;
            height: 60px;
            background: rgba(215, 255, 95, 0.2);
            border: 2px solid var(--nokia-light);
            color: var(--nokia-light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border-radius: 50%;
            cursor: pointer;
        }

        .control-btn:active {
            background: var(--nokia-light);
            color: #000;
        }

        .up { grid-area: up; margin: 0 auto; }
        .down { grid-area: down; margin: 0 auto; }
        .left { grid-area: left; }
        .right { grid-area: right; }

        .back-btn {
            background: #ff3b3b;
            color: #FFF;
            border: none;
            padding: 10px 20px;
            margin-top: 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div class="container" id="menuScreen">
        <h1>SNAKE</h1>
        <div class="snake-image">
            <div class="snake-decor"></div>
            <!-- Replacement for the missing image using CSS styling -->
        </div>
        
        <div class="description">
            RETRO NOKIA STYLE<br>
            Level: <span id="levelDisplay">CLASSIC</span><br>
            Speed: <span id="speedDisplay">MEDIUM</span>
        </div>

        <div class="settings-group">
            <div class="setting-item">
                <label>Level:</label>
                <select id="levelSelect">
                    <option value="classic">Classic (Walls Kill)</option>
                    <option value="teleport">Teleport (Wrap)</option>
                    <option value="reverse">Inverted Controls</option>
                    <option value="fast">High Speed</option>
                    <option value="walls">Obstacles</option>
                </select>
            </div>
            <div class="setting-item">
                <label>Difficulty:</label>
                <select id="speedSelect">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="hard">Expert</option>
                    <option value="impossible">Legendary</option>
                </select>
            </div>
        </div>

        <button class="play-btn" id="playBtn">START GAME</button>
    </div>

    <div id="gameView">
        <div class="game-header">
            <span>SCORE: <span id="scoreVal">0</span></span>
            <span>BEST: <span id="highScore">0</span></span>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="mobile-controls">
            <div class="control-btn up" id="ctrlUp">▲</div>
            <div class="control-btn left" id="ctrlLeft">◀</div>
            <div class="control-btn right" id="ctrlRight">▶</div>
            <div class="control-btn down" id="ctrlDown">▼</div>
        </div>

        <button class="back-btn" id="exitBtn">BACK TO MENU</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreVal');
        const highScoreEl = document.getElementById('highScore');
        const menuScreen = document.getElementById('menuScreen');
        const gameView = document.getElementById('gameView');

        const gridSize = 20;
        let tileCount = 20; // 400 / 20

        let snake = [];
        let food = { x: 5, y: 5 };
        let dx = 1;
        let dy = 0;
        let nextDx = 1;
        let nextDy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = false;
        let level = 'classic';
        let speed = 150;
        let gameLoop = null;

        const obstacles = [
            { x: 5, y: 5 }, { x: 6, y: 5 }, { x: 7, y: 5 },
            { x: 12, y: 10 }, { x: 13, y: 10 }, { x: 14, y: 10 },
            { x: 8, y: 15 }, { x: 9, y: 15 }, { x: 10, y: 15 }
        ];

        highScoreEl.textContent = highScore;

        // --- Event Listeners ---
        document.getElementById('playBtn').addEventListener('click', initGame);
        document.getElementById('exitBtn').addEventListener('click', () => {
            gameRunning = false;
            menuScreen.style.display = 'block';
            gameView.style.display = 'none';
        });

        // Keyboard
        window.addEventListener('keydown', handleKey);

        // Mobile Buttons
        document.getElementById('ctrlUp').addEventListener('touchstart', (e) => { e.preventDefault(); setDir(0, -1); });
        document.getElementById('ctrlDown').addEventListener('touchstart', (e) => { e.preventDefault(); setDir(0, 1); });
        document.getElementById('ctrlLeft').addEventListener('touchstart', (e) => { e.preventDefault(); setDir(-1, 0); });
        document.getElementById('ctrlRight').addEventListener('touchstart', (e) => { e.preventDefault(); setDir(1, 0); });

        // Swipe Detection
        let touchStartX = 0;
        let touchStartY = 0;
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            const dx_swipe = e.changedTouches[0].clientX - touchStartX;
            const dy_swipe = e.changedTouches[0].clientY - touchStartY;
            
            if (Math.abs(dx_swipe) > Math.abs(dy_swipe)) {
                if (Math.abs(dx_swipe) > 30) setDir(dx_swipe > 0 ? 1 : -1, 0);
            } else {
                if (Math.abs(dy_swipe) > 30) setDir(0, dy_swipe > 0 ? 1 : -1);
            }
        }, { passive: false });

        function handleKey(e) {
            if (!gameRunning && e.code === 'Space') initGame();
            if (!gameRunning) return;

            const key = e.key;
            if (key === 'ArrowUp') setDir(0, -1);
            if (key === 'ArrowDown') setDir(0, 1);
            if (key === 'ArrowLeft') setDir(-1, 0);
            if (key === 'ArrowRight') setDir(1, 0);
        }

        function setDir(newDx, newDy) {
            let actualDx = newDx;
            let actualDy = newDy;

            if (level === 'reverse') {
                actualDx = -newDx;
                actualDy = -newDy;
            }

            // Prevent 180-degree turns
            if (actualDx !== 0 && dx !== -actualDx) {
                nextDx = actualDx;
                nextDy = 0;
            } else if (actualDy !== 0 && dy !== -actualDy) {
                nextDx = 0;
                nextDy = actualDy;
            }
        }

        function initGame() {
            level = document.getElementById('levelSelect').value;
            const speedChoice = document.getElementById('speedSelect').value;
            
            if (speedChoice === 'easy') speed = 200;
            else if (speedChoice === 'medium') speed = 120;
            else if (speedChoice === 'hard') speed = 80;
            else if (speedChoice === 'impossible') speed = 50;

            if (level === 'fast') speed = Math.max(40, speed - 30);

            score = 0;
            scoreEl.textContent = '0';
            dx = 1; dy = 0;
            nextDx = 1; nextDy = 0;
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];

            spawnFood();
            
            menuScreen.style.display = 'none';
            gameView.style.display = 'flex';
            gameRunning = true;
            
            if (gameLoop) clearTimeout(gameLoop);
            loop();
        }

        function loop() {
            if (!gameRunning) return;
            update();
            draw();
            gameLoop = setTimeout(loop, speed);
        }

        function spawnFood() {
            let valid = false;
            while (!valid) {
                const fx = Math.floor(Math.random() * tileCount);
                const fy = Math.floor(Math.random() * tileCount);
                
                valid = !snake.some(s => s.x === fx && s.y === fy);
                if (level === 'walls') {
                    if (obstacles.some(o => o.x === fx && o.y === fy)) valid = false;
                }
                
                if (valid) food = { x: fx, y: fy };
            }
        }

        function update() {
            dx = nextDx;
            dy = nextDy;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Bound checking
            if (level === 'teleport') {
                if (head.x < 0) head.x = tileCount - 1;
                else if (head.x >= tileCount) head.x = 0;
                if (head.y < 0) head.y = tileCount - 1;
                else if (head.y >= tileCount) head.y = 0;
            } else {
                if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                    return gameOver();
                }
            }

            // Self collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

            // Wall collision
            if (level === 'walls' && obstacles.some(o => o.x === head.x && o.y === head.y)) return gameOver();

            snake.unshift(head);

            // Food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreEl.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function draw() {
            // Background
            ctx.fillStyle = '#7fbf00';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid markers (subtle)
            ctx.strokeStyle = 'rgba(48, 80, 0, 0.05)';
            for(let i=0; i<tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i*gridSize, 0); ctx.lineTo(i*gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i*gridSize); ctx.lineTo(canvas.width, i*gridSize);
                ctx.stroke();
            }

            // Food
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI*2);
            ctx.fill();

            // Obstacles
            if (level === 'walls') {
                ctx.fillStyle = '#406000';
                obstacles.forEach(o => {
                    ctx.fillRect(o.x * gridSize + 1, o.y * gridSize + 1, gridSize - 2, gridSize - 2);
                    ctx.strokeRect(o.x * gridSize + 4, o.y * gridSize + 4, gridSize - 8, gridSize - 8);
                });
            }

            // Snake
            snake.forEach((seg, i) => {
                const isHead = i === 0;
                ctx.fillStyle = isHead ? '#d7ff5f' : '#305000';
                
                // Draw rounded rectangle for segment
                const r = isHead ? 8 : 4;
                const x = seg.x * gridSize + 1;
                const y = seg.y * gridSize + 1;
                const w = gridSize - 2;
                const h = gridSize - 2;
                
                ctx.beginPath();
                ctx.roundRect(x, y, w, h, r);
                ctx.fill();
                
                if (isHead) {
                    // Eyes
                    ctx.fillStyle = '#000';
                    const eyeSize = 3;
                    if (dx === 1) { // Right
                        ctx.fillRect(x + w - 6, y + 4, eyeSize, eyeSize);
                        ctx.fillRect(x + w - 6, y + h - 7, eyeSize, eyeSize);
                    } else if (dx === -1) { // Left
                        ctx.fillRect(x + 3, y + 4, eyeSize, eyeSize);
                        ctx.fillRect(x + 3, y + h - 7, eyeSize, eyeSize);
                    } else if (dy === 1) { // Down
                        ctx.fillRect(x + 4, y + h - 6, eyeSize, eyeSize);
                        ctx.fillRect(x + w - 7, y + h - 6, eyeSize, eyeSize);
                    } else { // Up
                        ctx.fillRect(x + 4, y + 3, eyeSize, eyeSize);
                        ctx.fillRect(x + w - 7, y + 3, eyeSize, eyeSize);
                    }
                }
            });
        }

        function gameOver() {
            gameRunning = false;
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#d7ff5f';
            ctx.font = 'bold 30px Courier New';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 20);
            
            ctx.font = '20px Courier New';
            ctx.fillText('SCORE: ' + score, canvas.width/2, canvas.height/2 + 20);
            ctx.fillText('Click to Restart', canvas.width/2, canvas.height/2 + 60);
            
            canvas.onclick = () => {
                canvas.onclick = null;
                initGame();
            };
        }
    </script>
</body>
