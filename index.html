<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Snake - Nokia 3310 Edition</title>
    <!-- Importing pixel fonts for that authentic feel -->
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --nokia-blue: #1c3d5a;
            --nokia-silver: #c0c0c0;
            --lcd-green: #94af10;
            --lcd-dark: #2b3a1a;
            --btn-grey: #4a4a4a;
            --btn-light: #6a6a6a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #1a1a1a;
            background-image: radial-gradient(circle, #333 1px, transparent 1px);
            background-size: 20px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'VT323', monospace;
            overflow: hidden;
            color: #fff;
        }

        /* The Nokia 3310 Shell */
        .nokia-3310 {
            position: relative;
            width: 320px;
            height: 600px;
            background: var(--nokia-blue);
            border-radius: 40px 40px 100px 100px;
            box-shadow:
                0 20px 50px rgba(0, 0, 0, 0.8),
                inset 0 5px 15px rgba(255, 255, 255, 0.2),
                inset 0 -10px 20px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            border: 2px solid #0a1a2a;
        }

        /* Speaker grill */
        .speaker {
            width: 60px;
            height: 6px;
            background: #0a1a2a;
            border-radius: 3px;
            margin-top: 10px;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 2px rgba(0, 0, 0, 0.5);
        }

        /* Screen Section */
        .screen-bezel {
            width: 260px;
            height: 200px;
            background: #222;
            border-radius: 10px;
            padding: 15px;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 1);
            position: relative;
            margin-bottom: 30px;
            border: 1px solid #333;
        }

        .screen-glass {
            width: 100%;
            height: 100%;
            background: var(--lcd-green);
            border: 2px solid #000;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.3);
            animation: lcd-flicker 8s infinite;
        }

        /* Screen Reflection */
        .screen-glass::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, transparent 50%, rgba(0, 0, 0, 0.1) 100%);
            z-index: 20;
            pointer-events: none;
        }

        @keyframes lcd-flicker {
            0% {
                opacity: 1;
            }

            48% {
                opacity: 1;
            }

            50% {
                opacity: 0.98;
            }

            52% {
                opacity: 1;
            }

            100% {
                opacity: 1;
            }
        }

        /* LCD Pixel Effect */
        .screen-glass::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 2px 2px;
            pointer-events: none;
            z-index: 10;
        }

        /* Game View within screen */
        #gameArea {
            width: 100%;
            height: 100%;
            padding: 5px;
            display: flex;
            flex-direction: column;
            color: var(--lcd-dark);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            border-bottom: 1px solid var(--lcd-dark);
            padding-bottom: 2px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        /* Status Bar Icons */
        .status-icons {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .battery-icon {
            width: 15px;
            height: 8px;
            border: 1.5px solid var(--lcd-dark);
            position: relative;
        }

        .battery-icon::after {
            content: "";
            position: absolute;
            right: -3px;
            top: 1px;
            width: 2px;
            height: 3px;
            background: var(--lcd-dark);
        }

        .battery-fill {
            height: 100%;
            width: 80%;
            background: var(--lcd-dark);
        }

        .signal-icon {
            display: flex;
            gap: 1.5px;
            align-items: flex-end;
            height: 8px;
        }

        .signal-bar {
            width: 2px;
            background: var(--lcd-dark);
        }

        canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        /* Keypad Section */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 100%;
            padding: 0 10px;
        }

        .nav-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            width: 100%;
            margin-bottom: 20px;
            gap: 10px;
        }

        .btn {
            background: var(--btn-grey);
            border: none;
            border-radius: 50%;
            height: 45px;
            cursor: pointer;
            box-shadow:
                0 4px 0 #222,
                inset 0 2px 2px rgba(255, 255, 255, 0.2);
            color: #ddd;
            font-family: inherit;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: transform 0.05s, box-shadow 0.05s;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #222;
        }

        .btn span {
            font-size: 0.8rem;
            color: #aaa;
        }

        .btn-large {
            height: 55px;
            border-radius: 20px;
        }

        .btn-silver {
            background: var(--nokia-silver);
            color: #333;
            box-shadow: 0 4px 0 #888;
        }

        .btn-silver:active {
            box-shadow: 0 2px 0 #888;
        }

        /* Keypad Glow */
        .btn.active-glow {
            background: var(--btn-light);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        /* Splash Screen & Hands */
        .nokia-hands {
            position: relative;
            width: 100px;
            height: 60px;
            margin-bottom: 20px;
        }

        .hand {
            position: absolute;
            width: 40px;
            height: 10px;
            background: var(--lcd-dark);
            border-radius: 5px;
        }

        .hand-left {
            top: 10px;
            left: -20px;
            transform: rotate(30deg);
            animation: hand-in-left 2s forwards;
        }

        .hand-right {
            bottom: 10px;
            right: -20px;
            transform: rotate(-30deg);
            animation: hand-in-right 2s forwards;
        }

        @keyframes hand-in-left {
            0% {
                left: -60px;
                transform: rotate(45deg);
            }

            100% {
                left: 10px;
                transform: rotate(10deg);
            }
        }

        @keyframes hand-in-right {
            0% {
                right: -60px;
                transform: rotate(-45deg);
            }

            100% {
                right: 10px;
                transform: rotate(-10deg);
            }
        }

        .splash-text {
            font-size: 2.5rem;
            letter-spacing: 5px;
            font-weight: bold;
            opacity: 0;
            animation: fade-in 1s 2s forwards;
        }

        @keyframes fade-in {
            to {
                opacity: 1;
            }
        }

        /* Screens Display Logic */
        .ui-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .ui-screen.active {
            display: flex;
        }

        .menu-title {
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .menu-options {
            list-style: none;
            font-size: 1.5rem;
        }

        .menu-options li.selected {
            background: var(--lcd-dark);
            color: var(--lcd-green);
            padding: 0 10px;
        }

        .game-over-title {
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .score-display {
            font-size: 1.5rem;
        }

        /* Specific Nav Keys Positioning */
        .nav-up {
            grid-column: 2;
            height: 35px;
            border-radius: 10px 10px 0 0;
        }

        .nav-down {
            grid-column: 2;
            height: 35px;
            border-radius: 0 0 10px 10px;
        }

        .nav-left {
            grid-column: 1;
            grid-row: 1 / span 2;
            height: 100%;
            border-radius: 20px;
        }

        .nav-right {
            grid-column: 3;
            grid-row: 1 / span 2;
            height: 100%;
            border-radius: 20px;
        }
    </style>
</head>

<body>
    <div class="nokia-3310">
        <div class="speaker"></div>

        <div class="screen-bezel">
            <div class="screen-glass">
                <div id="gameArea">
                    <!-- Splash Screen -->
                    <div id="splashScreen" class="ui-screen active">
                        <div class="nokia-hands">
                            <div class="hand hand-left"></div>
                            <div class="hand hand-right"></div>
                        </div>
                        <div class="splash-text">NOKIA</div>
                    </div>

                    <!-- Menu Screen -->
                    <div id="menuScreen" class="ui-screen">
                        <div class="menu-title">SNAKE II</div>
                        <ul class="menu-options" id="menuList">
                            <li class="selected" data-action="start">START GAME</li>
                            <li data-action="settings">WALLS: <span id="wallState">ON</span></li>
                            <li data-action="highscore">HI-SCORE: <span id="menuHighScore">0</span></li>
                        </ul>
                    </div>

                    <!-- Game Screen -->
                    <div id="gamePlayScreen" class="ui-screen">
                        <div id="pauseOverlay"
                            style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); background:var(--lcd-green); padding:5px; border:2px solid var(--lcd-dark); z-index:100; font-weight:bold;">
                            PAUSED</div>
                        <div class="status-bar">
                            <div class="status-icons">
                                <div class="signal-icon">
                                    <div class="signal-bar" style="height: 20%"></div>
                                    <div class="signal-bar" style="height: 40%"></div>
                                    <div class="signal-bar" style="height: 60%"></div>
                                    <div class="signal-bar" style="height: 80%"></div>
                                </div>
                                <span id="levelName">SNAKE</span>
                            </div>
                            <div class="status-icons">
                                <span id="scoreVal">0</span>
                                <div class="battery-icon">
                                    <div class="battery-fill"></div>
                                </div>
                            </div>
                        </div>
                        <canvas id="gameCanvas"></canvas>
                    </div>

                    <!-- Game Over Screen -->
                    <div id="gameOverScreen" class="ui-screen">
                        <div id="recordLabel"
                            style="display:none; color:var(--lcd-dark); background:var(--lcd-green); font-weight:bold; font-size:1.2rem; margin-bottom:5px;">
                            ! NEW RECORD !</div>
                        <div class="game-over-title">GAME OVER</div>
                        <div class="score-display">Score: <span id="finalScoreVal">0</span></div>
                        <div style="margin-top: 10px; font-size: 1.2rem;">Press 5 to Retry</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Nokia Nav Buttons -->
        <div class="nav-buttons">
            <button class="btn btn-silver nav-left" id="btnLeft">◀</button>
            <button class="btn btn-silver nav-up" id="btnUp">▲</button>
            <button class="btn btn-silver nav-down" id="btnDown">▼</button>
            <button class="btn btn-silver nav-right" id="btnRight">▶</button>
        </div>

        <!-- Nokia Keypad -->
        <div class="keypad">
            <button class="btn">1 <span>. ,</span></button>
            <button class="btn" id="num2">2 <span>abc</span></button>
            <button class="btn">3 <span>def</span></button>
            <button class="btn" id="num4">4 <span>ghi</span></button>
            <button class="btn" id="num5">5 <span>jkl</span></button>
            <button class="btn" id="num6">6 <span>mno</span></button>
            <button class="btn">7 <span>pqrs</span></button>
            <button class="btn" id="num8">8 <span>tuv</span></button>
            <button class="btn">9 <span>wxyz</span></button>
            <button class="btn" id="btnStar">*</button>
            <button class="btn">0</button>
            <button class="btn" id="btnHash">#</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreVal');
        const menuScreen = document.getElementById('menuScreen');
        const gamePlayScreen = document.getElementById('gamePlayScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreVal = document.getElementById('finalScoreVal');

        // Audio System
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, vol = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            move: () => playTone(150, 'square', 0.05, 0.02),
            eat: () => playTone(880, 'square', 0.1, 0.1),
            die: () => {
                playTone(440, 'square', 0.2, 0.1);
                setTimeout(() => playTone(220, 'square', 0.4, 0.1), 200);
            },
            click: () => playTone(600, 'square', 0.05, 0.05),
            start: () => {
                const notes = [440, 493, 523, 587, 659];
                notes.forEach((n, i) => setTimeout(() => playTone(n, 'square', 0.15, 0.05), i * 150));
            },
            record: () => {
                const notes = [523, 659, 783, 1046];
                notes.forEach((n, i) => setTimeout(() => playTone(n, 'square', 0.1, 0.05), i * 100));
            }
        };

        // Game Constants
        const gridW = 30; // 30 pixels wide
        const gridH = 18; // 18 pixels high
        const pixelSize = 4; // Visual size for blocks

        let snake = [];
        let food = { x: 0, y: 0 };
        let dir = { x: 1, y: 0 };
        let nextDir = { x: 1, y: 0 };
        let score = 0;
        let gameRunning = false;
        let isPaused = false;
        let wallMode = true;
        let gameLoop = null;
        let speed = 150;
        let highScore = localStorage.getItem('nokiaHighScore') || 0;

        function resize() {
            const container = canvas.parentElement;
            canvas.width = gridW * pixelSize;
            canvas.height = gridH * pixelSize;
        }
        window.addEventListener('resize', resize);
        resize();

        // UI State
        let currentScreen = 'splashScreen';

        // Auto transition from splash to menu
        setTimeout(() => {
            if (currentScreen === 'splashScreen') {
                sounds.start();
                showScreen('menuScreen');
            }
        }, 3200);

        function showScreen(id) {
            if (id === 'menuScreen') {
                document.getElementById('menuHighScore').textContent = highScore;
            }
            [document.getElementById('splashScreen'), menuScreen, gamePlayScreen, gameOverScreen].forEach(s => {
                if (s) s.classList.remove('active');
            });
            document.getElementById(id).classList.add('active');
            currentScreen = id;
        }

        // Controls
        function handleInput(key) {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            // Visual button feedback
            const btnMap = { 'ArrowUp': 'btnUp', 'ArrowDown': 'btnDown', 'ArrowLeft': 'btnLeft', 'ArrowRight': 'btnRight', '5': 'num5', '2': 'num2', '4': 'num4', '6': 'num6', '8': 'num8' };
            const btnId = btnMap[key];
            if (btnId) {
                const el = document.getElementById(btnId);
                if (el) {
                    el.classList.add('active-glow');
                    setTimeout(() => el.classList.remove('active-glow'), 100);
                }
            }

            if (currentScreen === 'splashScreen') {
                sounds.start();
                showScreen('menuScreen');
                return;
            }

            if (currentScreen === 'menuScreen') {
                if (key === 'ArrowUp' || key === 'ArrowDown') {
                    sounds.click();
                    const items = document.querySelectorAll('#menuList li');
                    const selected = document.querySelector('#menuList li.selected');
                    selected.classList.remove('selected');
                    if (key === 'ArrowUp') (selected.previousElementSibling || items[items.length - 1]).classList.add('selected');
                    else (selected.nextElementSibling || items[0]).classList.add('selected');
                }
                if (key === 'Enter' || key === '5' || key === ' ') {
                    sounds.click();
                    const selected = document.querySelector('#menuList li.selected');
                    if (selected.dataset.action === 'start') {
                        initGame();
                    } else if (selected.dataset.action === 'settings') {
                        wallMode = !wallMode;
                        document.getElementById('wallState').textContent = wallMode ? 'ON' : 'OFF';
                    }
                }
            } else if (currentScreen === 'gamePlayScreen') {
                if (key === '#' || key === '*' || key === 'p') {
                    isPaused = !isPaused;
                    document.getElementById('pauseOverlay').style.display = isPaused ? 'block' : 'none';
                    sounds.click();
                    return;
                }
                if (isPaused) return;
                if (key === 'ArrowUp' && dir.y === 0) nextDir = { x: 0, y: -1 };
                if (key === 'ArrowDown' && dir.y === 0) nextDir = { x: 0, y: 1 };
                if (key === 'ArrowLeft' && dir.x === 0) nextDir = { x: -1, y: 0 };
                if (key === 'ArrowRight' && dir.x === 0) nextDir = { x: 1, y: 0 };
            } else if (currentScreen === 'gameOverScreen') {
                if (key === 'Enter' || key === '5') {
                    sounds.click();
                    showScreen('menuScreen');
                }
            }
        }

        window.addEventListener('keydown', e => handleInput(e.key));

        const bindBtn = (id, key) => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('mousedown', () => handleInput(key));
                el.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(key); });
            }
        };

        bindBtn('btnUp', 'ArrowUp');
        bindBtn('btnDown', 'ArrowDown');
        bindBtn('btnLeft', 'ArrowLeft');
        bindBtn('btnRight', 'ArrowRight');
        bindBtn('num5', '5');
        bindBtn('num2', 'ArrowUp');
        bindBtn('num4', 'ArrowLeft');
        bindBtn('num6', 'ArrowRight');
        bindBtn('num8', 'ArrowDown');
        bindBtn('btnHash', '#');
        bindBtn('btnStar', '*');

        document.querySelectorAll('.btn').forEach(b => {
            b.addEventListener('mousedown', () => sounds.click());
        });

        // Signal/Battery Simulation
        setInterval(() => {
            const bars = document.querySelectorAll('.signal-bar');
            const down = Math.random() > 0.8;
            bars.forEach((b, i) => b.style.opacity = (down && i > 1) ? '0.2' : '1');
        }, 3000);

        function spawnFood() {
            let valid = false;
            while (!valid) {
                food = {
                    x: Math.floor(Math.random() * gridW),
                    y: Math.floor(Math.random() * gridH)
                };
                valid = !snake.some(s => s.x === food.x && s.y === food.y);
            }
        }

        function initGame() {
            score = 0;
            scoreEl.textContent = '0';
            isPaused = false;
            document.getElementById('pauseOverlay').style.display = 'none';
            dir = { x: 1, y: 0 };
            nextDir = { x: 1, y: 0 };
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            spawnFood();
            showScreen('gamePlayScreen');
            gameRunning = true;
            lastTime = performance.now();
            requestAnimationFrame(loop);
        }

        function loop(timestamp) {
            if (!gameRunning) return;

            const delta = timestamp - lastTime;
            if (delta > speed) {
                if (!isPaused) update();
                draw();
                lastTime = timestamp;
            }
            requestAnimationFrame(loop);
        }

        function update() {
            dir = nextDir;
            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

            // Collision checks
            if (head.x < 0 || head.x >= gridW || head.y < 0 || head.y >= gridH) {
                if (!wallMode) {
                    if (head.x < 0) head.x = gridW - 1; else if (head.x >= gridW) head.x = 0;
                    if (head.y < 0) head.y = gridH - 1; else if (head.y >= gridH) head.y = 0;
                } else {
                    return die();
                }
            }
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                return die();
            }

            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += (9 + Math.floor(score / 100)); // Bonus points as score grows
                scoreEl.textContent = score;
                if (score > highScore) {
                    if (highScore > 0 && score <= highScore + 10) sounds.record(); // Only play jingle once when record is broken
                    highScore = score;
                    localStorage.setItem('nokiaHighScore', highScore);
                }
                sounds.eat();
                spawnFood();
                // Battery drain simulation
                if (score > 100) document.querySelector('.battery-fill').style.width = '60%';
                if (score > 300) document.querySelector('.battery-fill').style.width = '30%';
                // Increase speed slightly
                if (speed > 60) speed -= 2;
            } else {
                snake.pop();
            }
        }

        function die() {
            gameRunning = false;
            sounds.die();
            finalScoreVal.textContent = score;
            const isNewRecord = (score > 0 && score >= highScore);
            document.getElementById('recordLabel').style.display = isNewRecord ? 'block' : 'none';
            setTimeout(() => showScreen('gameOverScreen'), 1000);
        }

        function draw() {
            // Authentic LCD Ghosting: We don't clear fully, creating a trail
            ctx.fillStyle = 'rgba(148, 175, 16, 0.4)'; // LCD background with alpha
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Food (Classic Pixel Cross)
            ctx.fillStyle = 'rgba(43, 58, 26, 0.8)';
            const fx = food.x * pixelSize;
            const fy = food.y * pixelSize;
            ctx.fillRect(fx + 1, fy, 2, 1);
            ctx.fillRect(fx, fy + 1, 4, 2);
            ctx.fillRect(fx + 1, fy + 3, 2, 1);

            // Draw Snake
            snake.forEach((p, i) => {
                const sx = p.x * pixelSize;
                const sy = p.y * pixelSize;

                if (i === 0) {
                    ctx.fillStyle = '#2b3a1a';
                    // Head with "eyes"
                    ctx.fillRect(sx, sy, pixelSize, pixelSize);
                    ctx.fillStyle = '#94af10';
                    if (dir.x !== 0) {
                        ctx.fillRect(sx + 2, sy, 1, 1);
                        ctx.fillRect(sx + 2, sy + 3, 1, 1);
                    } else {
                        ctx.fillRect(sx, sy + 2, 1, 1);
                        ctx.fillRect(sx + 3, sy + 2, 1, 1);
                    }
                } else {
                    // Body block - slightly more transparent for that LCD blur
                    ctx.fillStyle = `rgba(43, 58, 26, ${Math.max(0.4, 1 - i * 0.05)})`;
                    ctx.fillRect(sx + 0.5, sy + 0.5, pixelSize - 1, pixelSize - 1);
                }
            });
        }

        // Initial Draw
        draw();
    </script>
</body>

</html>
