<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Snake - Nokia 3310 Edition</title>
    <!-- Importing pixel fonts for that authentic feel -->
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --nokia-blue: #1c3d5a;
            --nokia-silver: #c0c0c0;
            --lcd-green: #94af10;
            --lcd-dark: #2b3a1a;
            --btn-grey: #3a3a3a;
            --btn-dark: #1a1a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #0f0f0f;
            background-image:
                radial-gradient(#333 1px, transparent 1px),
                linear-gradient(to bottom, #111, #000);
            background-size: 20px 20px, 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'VT323', monospace;
            overflow: hidden;
            color: #fff;
            perspective: 1200px;
        }

        .phone-container {
            position: relative;
            transform: rotateX(5deg) rotateY(-5deg);
            filter: drop-shadow(0 40px 100px rgba(0, 0, 0, 0.8));
        }

        .phone-shadow {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 40px;
            background: rgba(0, 0, 0, 0.6);
            filter: blur(25px);
            border-radius: 50%;
            z-index: -1;
        }

        /* The Ultra-Premium Nokia 3310 Shell */
        .nokia-3310 {
            position: relative;
            width: 360px;
            height: 700px;
            background: linear-gradient(135deg, #244b6d 0%, #1c3d5a 50%, #152e44 100%);
            border-radius: 60px 60px 140px 140px;
            box-shadow:
                0 50px 100px rgba(0, 0, 0, 0.9),
                inset 0 10px 15px rgba(255, 255, 255, 0.1),
                inset 0 -15px 40px rgba(0, 0, 0, 0.7),
                0 0 0 4px #0a1a2a;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            perspective: 1000px;
            overflow: hidden;
        }

        /* Plastic Texture Overlay */
        .nokia-3310::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04;
            pointer-events: none;
            z-index: 2;
        }

        /* Ambient Screen Glow */
        .nokia-3310::before {
            content: "";
            position: absolute;
            top: 100px;
            width: 280px;
            height: 220px;
            background: rgba(148, 175, 16, 0.2);
            filter: blur(40px);
            border-radius: 20px;
            z-index: 1;
            pointer-events: none;
            animation: backlight-pulse 4s infinite alternate;
        }

        @keyframes backlight-pulse {
            from {
                opacity: 0.3;
                transform: scale(0.95);
            }

            to {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }

        .speaker {
            display: flex;
            gap: 5px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .speaker-hole {
            width: 6px;
            height: 20px;
            background: #0a0a0a;
            border-radius: 3px;
            box-shadow: inset 0 2px 5px #000;
        }

        .screen-bezel {
            width: 300px;
            height: 230px;
            background: #0d0d0d;
            border-radius: 15px;
            padding: 14px;
            box-shadow:
                inset 0 4px 15px #000,
                0 0 0 5px #2c4c6a,
                0 8px 20px rgba(0, 0, 0, 0.8),
                0 1px 1px rgba(255, 255, 255, 0.2);
            position: relative;
            margin-bottom: 35px;
            border: 1px solid #333;
            z-index: 5;
        }

        .screen-glass {
            width: 100%;
            height: 100%;
            background: var(--lcd-green);
            border: 2px solid #000;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.3);
            animation: lcd-flicker 10s infinite;
        }

        .screen-glass::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.3) 0%, transparent 50%, rgba(0, 0, 0, 0.2) 100%);
            z-index: 20;
            pointer-events: none;
            border-radius: 2px;
        }

        @keyframes lcd-flicker {

            0%,
            48%,
            52%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.97;
            }
        }

        .screen-glass::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 0, 0, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.06) 1px, transparent 1px);
            background-size: 2px 2px;
            pointer-events: none;
            z-index: 10;
        }

        #gameArea {
            width: 100%;
            height: 100%;
            padding: 6px;
            display: flex;
            flex-direction: column;
            color: var(--lcd-dark);
            position: relative;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            border-bottom: 1px solid var(--lcd-dark);
            padding-bottom: 2px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .status-icons {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .battery-icon {
            width: 14px;
            height: 8px;
            border: 1.5px solid var(--lcd-dark);
            position: relative;
        }

        .battery-icon::after {
            content: "";
            position: absolute;
            right: -3px;
            top: 1px;
            width: 2px;
            height: 3px;
            background: var(--lcd-dark);
        }

        .battery-fill {
            height: 100%;
            width: 90%;
            background: var(--lcd-dark);
            transition: width 0.5s;
        }

        .signal-icon {
            display: flex;
            gap: 1.5px;
            align-items: flex-end;
            height: 8px;
        }

        .signal-bar {
            width: 2px;
            background: var(--lcd-dark);
            transition: opacity 0.3s;
        }

        canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        .keypad-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .nav-cluster {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr;
            gap: 10px;
            padding: 0 10px;
            align-items: center;
        }

        .arrow-keys {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        /* Nokia Brand Badge */
        .nokia-badge {
            font-family: sans-serif;
            font-weight: 900;
            font-size: 0.65rem;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        /* Separator between screen and keys */
        .keypad-separator {
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.08), transparent);
            margin-bottom: 5px;
        }

        .nav-key {
            background: linear-gradient(to bottom, #4a4a4a, #2a2a2a);
            border: none;
            cursor: pointer;
            box-shadow:
                0 6px 0 #000,
                inset 0 2px 3px rgba(255, 255, 255, 0.1),
                0 12px 25px rgba(0, 0, 0, 0.5);
            color: #ddd;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.05s;
            z-index: 10;
        }

        .btn-c {
            width: 70px;
            height: 48px;
            border-radius: 40% 10% 40% 10%;
            font-size: 1.4rem;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #555, #333);
        }

        .btn-select {
            height: 75px;
            background: linear-gradient(to bottom, #fdfdfd, #bbb);
            border-radius: 35% 35% 50% 50%;
            box-shadow: 0 8px 0 #777, inset 0 3px 6px #fff, 0 0 0 4px rgba(148, 175, 16, 0.4);
            border: 1px solid #aaa;
        }

        .arrow-key {
            width: 75px;
            height: 40px;
            border-radius: 12px;
            font-size: 1.3rem;
        }

        .btn-num {
            height: 55px;
            background: linear-gradient(to bottom, #444, #222);
            color: #fff;
            border-radius: 25px;
            border: 1px solid #1a1a1a;
            box-shadow:
                0 6px 0 #000,
                inset 0 1px 2px rgba(255, 255, 255, 0.2),
                0 10px 20px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: inherit;
            cursor: pointer;
            font-size: 1.3rem;
        }

        .btn-num span {
            font-size: 0.75rem;
            color: #888;
            margin-top: -2px;
            letter-spacing: 1px;
        }

        .nav-key:active,
        .btn-num:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #000;
        }

        .nav-key.active-glow,
        .btn-num.active-glow {
            background: #666;
            box-shadow: 0 0 20px rgba(148, 175, 16, 0.4);
        }

        .ui-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .ui-screen.active {
            display: flex;
        }

        .nokia-hands-svg {
            width: 220px;
            height: 120px;
            margin-bottom: 20px;
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.5));
        }

        .hand-path {
            fill: var(--lcd-dark);
            stroke: var(--lcd-dark);
            stroke-width: 0.2px;
        }

        .hand-l {
            transform: translate(-150px, -20px);
            animation: hand-meet-l 3s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hand-r {
            transform: translate(150px, 20px);
            animation: hand-meet-r 3s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes hand-meet-l {
            to {
                transform: translate(0, 0);
            }
        }

        @keyframes hand-meet-r {
            to {
                transform: translate(0, 0);
            }
        }

        .logo-text {
            font-family: sans-serif;
            font-weight: 900;
            font-size: 3.5rem;
            letter-spacing: 14px;
            color: var(--lcd-dark);
            opacity: 0;
            animation: fade-in 1s 2s forwards;
            scale: 0.9;
        }

        @keyframes fade-in {
            to {
                opacity: 1;
                scale: 1;
            }
        }

        .menu-title {
            font-size: 2.8rem;
            margin-bottom: 5px;
        }

        .menu-options {
            list-style: none;
            font-size: 1.6rem;
            width: 100%;
        }

        .menu-options li {
            padding: 2px 0;
        }

        .menu-options li.selected {
            background: var(--lcd-dark);
            color: var(--lcd-green);
        }

        .record-banner {
            color: #fff;
            background: var(--lcd-dark);
            padding: 2px 10px;
            font-weight: bold;
            margin-bottom: 5px;
            display: none;
        }

        .game-over-title {
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="phone-container">
        <div class="phone-shadow"></div>
        <div class="nokia-3310">
            <div class="speaker">
                <div class="speaker-hole"></div>
                <div class="speaker-hole"></div>
                <div class="speaker-hole"></div>
            </div>

            <div class="screen-bezel">
                <div class="screen-glass">
                    <div id="gameArea">
                        <!-- Splash Screen -->
                        <div id="splashScreen" class="ui-screen active">
                            <svg class="nokia-hands-svg" viewBox="0 0 240 120">
                                <!-- High-Detail Anatomical Left Hand -->
                                <g class="hand-l">
                                    <path class="hand-path"
                                        d="M10 60 C30 40 70 35 100 55 L140 70 L125 85 C90 75 40 85 10 75 Z" />
                                    <path class="hand-path" d="M100 55 C115 40 135 45 140 60 C145 75 130 85 115 80 Z" />
                                    <path class="hand-path" d="M140 70 L170 80 C180 85 180 100 165 105 L140 95 Z" />
                                    <path class="hand-path" d="M135 80 L165 92 C175 100 170 115 155 120 L130 108 Z" />
                                    <path class="hand-path" d="M125 90 L150 105 C158 115 152 130 138 132 L118 115 Z" />
                                </g>
                                <!-- High-Detail Anatomical Right Hand -->
                                <g class="hand-r">
                                    <path class="hand-path"
                                        d="M230 60 C210 40 170 35 140 55 L100 70 L115 85 C150 75 200 85 230 75 Z" />
                                    <path class="hand-path" d="M140 55 C125 40 105 45 100 60 C95 75 110 85 125 80 Z" />
                                    <path class="hand-path" d="M100 70 L70 80 C60 85 60 100 75 105 L100 95 Z" />
                                    <path class="hand-path" d="M105 80 L75 92 C65 100 70 115 85 120 L110 108 Z" />
                                    <path class="hand-path" d="M115 90 L90 105 C82 115 88 130 102 132 L122 115 Z" />
                                </g>
                            </svg>
                            <div class="logo-text">NOKIA</div>
                        </div>

                        <!-- Menu Screen -->
                        <div id="menuScreen" class="ui-screen">
                            <div class="menu-title">SNAKE II</div>
                            <ul class="menu-options" id="menuList">
                                <li class="selected" data-action="start">START GAME</li>
                                <li data-action="level">LEVEL: <span id="levelVal">1</span></li>
                                <li data-action="mode">MODE: <span id="modeVal">SOLID</span></li>
                                <li data-action="highscore">HI-SCORE: <span id="menuHighScore">0</span></li>
                            </ul>
                        </div>

                        <!-- Game Screen -->
                        <div id="gamePlayScreen" class="ui-screen">
                            <div id="pauseOverlay"
                                style="display:none; position:absolute; top:45%; left:50%; transform:translate(-50%, -50%); background:var(--lcd-green); padding:5px 15px; border:2px solid var(--lcd-dark); z-index:100; font-weight:bold; font-size:1.5rem;">
                                PAUSED</div>
                            <div class="status-bar">
                                <div class="status-icons">
                                    <div class="signal-icon">
                                        <div class="signal-bar" style="height: 20%"></div>
                                        <div class="signal-bar" style="height: 40%"></div>
                                        <div class="signal-bar" style="height: 60%"></div>
                                        <div class="signal-bar" style="height: 80%"></div>
                                    </div>
                                    <span id="levelName">SNAKE</span>
                                </div>
                                <div class="status-icons">
                                    <span id="scoreVal">0</span>
                                    <div class="battery-icon">
                                        <div class="battery-fill"></div>
                                    </div>
                                </div>
                            </div>
                            <canvas id="gameCanvas"></canvas>
                        </div>

                        <!-- Game Over Screen -->
                        <div id="gameOverScreen" class="ui-screen">
                            <div id="recordLabel" class="record-banner">NEW RECORD!</div>
                            <div class="game-over-title">GAME OVER</div>
                            <div style="font-size: 1.8rem;">Score: <span id="finalScoreVal">0</span></div>
                            <div style="margin-top: 15px; font-size: 1.3rem;">Press <span
                                    style="background:#000;color:#94af10;padding:0 4px;">5</span> to Retry</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="nokia-badge">NOKIA</div>
            <div class="keypad-separator"></div>

            <!-- AUTHENTIC KEYPAD -->
            <div class="keypad-container">
                <div class="nav-cluster">
                    <button class="nav-key btn-c" id="btnC">C</button>
                    <button class="nav-key btn-select" id="btnSelect"></button>
                    <div class="arrow-keys">
                        <button class="nav-key arrow-key" id="btnUp">▲</button>
                        <button class="nav-key arrow-key" id="btnDown">▼</button>
                    </div>
                </div>

                <div class="num-pad">
                    <button class="btn-num">1</button>
                    <button class="btn-num" id="num2">2 <span>abc</span></button>
                    <button class="btn-num">3 <span>def</span></button>
                    <button class="btn-num" id="num4">4 <span>ghi</span></button>
                    <button class="btn-num" id="num5">5 <span>jkl</span></button>
                    <button class="btn-num" id="num6">6 <span>mno</span></button>
                    <button class="btn-num">7 <span>pqrs</span></button>
                    <button class="btn-num" id="num8">8 <span>tuv</span></button>
                    <button class="btn-num">9 <span>wxyz</span></button>
                    <button class="btn-num" id="btnStar">*</button>
                    <button class="btn-num">0</button>
                    <button class="btn-num" id="btnHash">#</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreVal');
        const menuScreen = document.getElementById('menuScreen');
        const gamePlayScreen = document.getElementById('gamePlayScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreVal = document.getElementById('finalScoreVal');

        // Audio System
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, vol = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            move: () => playTone(150, 'square', 0.05, 0.02),
            eat: () => playTone(880, 'square', 0.1, 0.1),
            die: () => {
                playTone(440, 'square', 0.2, 0.1);
                setTimeout(() => playTone(220, 'square', 0.4, 0.1), 200);
            },
            click: () => playTone(600, 'square', 0.05, 0.05),
            start: () => {
                const notes = [440, 493, 523, 587, 659];
                notes.forEach((n, i) => setTimeout(() => playTone(n, 'square', 0.15, 0.05), i * 150));
            },
            record: () => {
                const notes = [523, 659, 783, 1046];
                notes.forEach((n, i) => setTimeout(() => playTone(n, 'square', 0.1, 0.05), i * 100));
            }
        };

        // Game Constants
        const gridW = 30; // 30 pixels wide
        const gridH = 18; // 18 pixels high
        const pixelSize = 4; // Visual size for blocks

        let snake = [];
        let food = { x: 0, y: 0 };
        let dir = { x: 1, y: 0 };
        let nextDir = { x: 1, y: 0 };
        let score = 0;
        let isPaused = false;
        let gameMode = 'SOLID'; // SOLID, WRAP, MAZE, MIX
        let obstacles = [];
        let currentLevel = 1;
        let gameLoop = null;
        let speed = 150;
        let highScore = localStorage.getItem('nokiaHighScore') || 0;
        let gameRunning = false;
        let lastTime = 0;

        function resize() {
            const container = canvas.parentElement;
            canvas.width = gridW * pixelSize;
            canvas.height = gridH * pixelSize;
        }
        window.addEventListener('resize', resize);
        resize();

        // UI State
        let currentScreen = 'splashScreen';

        // Auto transition from splash to menu
        setTimeout(() => {
            if (currentScreen === 'splashScreen') {
                sounds.start();
                showScreen('menuScreen');
            }
        }, 3200);

        function showScreen(id) {
            if (id === 'menuScreen') {
                document.getElementById('menuHighScore').textContent = highScore;
            }
            [document.getElementById('splashScreen'), menuScreen, gamePlayScreen, gameOverScreen].forEach(s => {
                if (s) s.classList.remove('active');
            });
            document.getElementById(id).classList.add('active');
            currentScreen = id;
        }

        // Controls
        function handleInput(key) {
            if (audioCtx.state === 'suspended') audioCtx.resume();

            // Visual button feedback mapping for all buttons
            const btnMap = {
                'ArrowUp': 'btnUp', 'ArrowDown': 'btnDown',
                'ArrowLeft': 'num4', 'ArrowRight': 'num6',
                '5': 'num5', '2': 'num2', '4': 'num4', '6': 'num6', '8': 'num8',
                'Select': 'btnSelect', 'Enter': 'btnSelect', ' ': 'btnSelect',
                'Escape': 'btnC', 'Backspace': 'btnC',
                '#': 'btnHash', '*': 'btnStar'
            };
            const btnId = btnMap[key];
            if (btnId) {
                const el = document.getElementById(btnId);
                if (el) {
                    el.classList.add('active-glow');
                    setTimeout(() => el.classList.remove('active-glow'), 100);
                }
            }

            if (currentScreen === 'splashScreen') {
                sounds.start();
                showScreen('menuScreen');
                return;
            }

            if (currentScreen === 'menuScreen') {
                if (key === 'ArrowUp' || key === 'ArrowDown' || key === '2' || key === '8') {
                    sounds.click();
                    const items = document.querySelectorAll('#menuList li');
                    const selected = document.querySelector('#menuList li.selected');
                    selected.classList.remove('selected');
                    const isUp = key === 'ArrowUp' || key === '2';
                    if (isUp) (selected.previousElementSibling || items[items.length - 1]).classList.add('selected');
                    else (selected.nextElementSibling || items[0]).classList.add('selected');
                }
                if (key === 'Enter' || key === '5' || key === ' ' || key === 'Select') {
                    sounds.click();
                    const selected = document.querySelector('#menuList li.selected');
                    const action = selected.dataset.action;
                    if (action === 'start') {
                        initGame();
                    } else if (action === 'mode') {
                        const modes = ['SOLID', 'WRAP', 'MAZE', 'MIX'];
                        let idx = modes.indexOf(gameMode);
                        gameMode = modes[(idx + 1) % modes.length];
                        document.getElementById('modeVal').textContent = gameMode;
                    } else if (action === 'level') {
                        currentLevel = (currentLevel % 9) + 1;
                        document.getElementById('levelVal').textContent = currentLevel;
                    }
                }
            } else if (currentScreen === 'gamePlayScreen') {
                if (key === '#' || key === '*' || key === 'p' || key === 'Escape') {
                    isPaused = !isPaused;
                    document.getElementById('pauseOverlay').style.display = isPaused ? 'block' : 'none';
                    sounds.click();
                    return;
                }
                if (isPaused) return;
                if ((key === 'ArrowUp' || key === '2') && dir.y === 0) nextDir = { x: 0, y: -1 };
                if ((key === 'ArrowDown' || key === '8') && dir.y === 0) nextDir = { x: 0, y: 1 };
                if ((key === 'ArrowLeft' || key === '4') && dir.x === 0) nextDir = { x: -1, y: 0 };
                if ((key === 'ArrowRight' || key === '6') && dir.x === 0) nextDir = { x: 1, y: 0 };
            } else if (currentScreen === 'gameOverScreen') {
                if (key === 'Enter' || key === '5' || key === 'Select') {
                    sounds.click();
                    showScreen('menuScreen');
                }
            }
        }

        window.addEventListener('keydown', e => handleInput(e.key));

        const bindBtn = (id, key) => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('mousedown', (e) => { e.preventDefault(); handleInput(key); });
                el.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(key); });
            }
        };

        bindBtn('btnUp', 'ArrowUp');
        bindBtn('btnDown', 'ArrowDown');
        bindBtn('num2', '2');
        bindBtn('num4', '4');
        bindBtn('num5', '5');
        bindBtn('num6', '6');
        bindBtn('num8', '8');
        bindBtn('btnSelect', 'Select');
        bindBtn('btnHash', '#');
        bindBtn('btnStar', '*');
        bindBtn('btnC', 'Escape');

        document.querySelectorAll('.btn').forEach(b => {
            b.addEventListener('mousedown', () => sounds.click());
        });

        // Signal/Battery Simulation
        setInterval(() => {
            const bars = document.querySelectorAll('.signal-bar');
            const down = Math.random() > 0.8;
            bars.forEach((b, i) => b.style.opacity = (down && i > 1) ? '0.2' : '1');
        }, 3000);

        function spawnFood() {
            let valid = false;
            while (!valid) {
                food = {
                    x: Math.floor(Math.random() * gridW),
                    y: Math.floor(Math.random() * gridH)
                };
                valid = !snake.some(s => s.x === food.x && s.y === food.y) &&
                    !obstacles.some(o => o.x === food.x && o.y === food.y);
            }
        }

        function createObstacles() {
            obstacles = [];
            if (gameMode === 'MAZE' || gameMode === 'MIX') {
                // Create a few cross-shaped or line obstacles
                const centers = [
                    { x: 7, y: 5 }, { x: 22, y: 5 },
                    { x: 7, y: 12 }, { x: 22, y: 12 },
                    { x: 15, y: 9 }
                ];
                centers.forEach(c => {
                    for (let i = -2; i <= 2; i++) {
                        if (c.x + i > 0 && c.x + i < gridW - 1) obstacles.push({ x: c.x + i, y: c.y });
                        if (c.y + i > 0 && c.y + i < gridH - 1) obstacles.push({ x: c.x, y: c.y + i });
                    }
                });
            }
        }

        function initGame() {
            score = 0;
            scoreEl.textContent = '0';
            isPaused = false;
            document.getElementById('pauseOverlay').style.display = 'none';
            createObstacles();
            // Speed logic: Level 1 (200ms) to Level 9 (40ms)
            speed = 220 - (currentLevel * 20);
            dir = { x: 1, y: 0 };
            nextDir = { x: 1, y: 0 };
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            spawnFood();
            showScreen('gamePlayScreen');
            gameRunning = true;
            lastTime = performance.now();
            requestAnimationFrame(loop);
        }

        function loop(timestamp) {
            if (!gameRunning) return;

            const delta = timestamp - lastTime;
            if (delta > speed) {
                if (!isPaused) update();
                draw();
                lastTime = timestamp;
            }
            requestAnimationFrame(loop);
        }

        function update() {
            dir = nextDir;
            const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

            // Collision checks
            const isWrap = (gameMode === 'WRAP' || gameMode === 'MIX');
            if (head.x < 0 || head.x >= gridW || head.y < 0 || head.y >= gridH) {
                if (isWrap) {
                    if (head.x < 0) head.x = gridW - 1; else if (head.x >= gridW) head.x = 0;
                    if (head.y < 0) head.y = gridH - 1; else if (head.y >= gridH) head.y = 0;
                } else {
                    return die();
                }
            }
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                return die();
            }
            if (obstacles.some(o => o.x === head.x && o.y === head.y)) {
                return die();
            }

            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += (9 + Math.floor(score / 100)); // Bonus points as score grows
                scoreEl.textContent = score;
                if (score > highScore) {
                    if (highScore > 0 && score <= highScore + 10) sounds.record(); // Only play jingle once when record is broken
                    highScore = score;
                    localStorage.setItem('nokiaHighScore', highScore);
                }
                sounds.eat();
                spawnFood();
                // Battery drain simulation
                if (score > 100) document.querySelector('.battery-fill').style.width = '60%';
                if (score > 300) document.querySelector('.battery-fill').style.width = '30%';
                // Increase speed slightly
                if (speed > 60) speed -= 2;
            } else {
                snake.pop();
            }
        }

        function die() {
            gameRunning = false;
            sounds.die();
            finalScoreVal.textContent = score;
            const isNewRecord = (score > 0 && score >= highScore);
            document.getElementById('recordLabel').style.display = isNewRecord ? 'block' : 'none';
            setTimeout(() => showScreen('gameOverScreen'), 1000);
        }

        function draw() {
            // Authentic LCD Ghosting: We don't clear fully, creating a trail
            ctx.fillStyle = 'rgba(148, 175, 16, 0.4)'; // LCD background with alpha
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Food (Classic Pixel Cross)
            ctx.fillStyle = 'rgba(43, 58, 26, 0.8)';
            const fx = food.x * pixelSize;
            const fy = food.y * pixelSize;
            ctx.fillRect(fx + 1, fy, 2, 1);
            ctx.fillRect(fx, fy + 1, 4, 2);
            ctx.fillRect(fx + 1, fy + 3, 2, 1);

            // Draw Obstacles
            ctx.fillStyle = '#1a2a0a';
            obstacles.forEach(o => {
                ctx.fillRect(o.x * pixelSize, o.y * pixelSize, pixelSize, pixelSize);
                // Inner "brick" pattern for retro texture
                ctx.fillStyle = 'rgba(148, 175, 16, 0.15)';
                ctx.fillRect(o.x * pixelSize + 1, o.y * pixelSize + 1, pixelSize - 2, pixelSize - 2);
                ctx.fillStyle = '#1a2a0a';
            });

            // Draw Snake
            snake.forEach((p, i) => {
                const sx = p.x * pixelSize;
                const sy = p.y * pixelSize;

                if (i === 0) {
                    ctx.fillStyle = '#2b3a1a';
                    // Head with "eyes"
                    ctx.fillRect(sx, sy, pixelSize, pixelSize);
                    ctx.fillStyle = '#94af10';
                    if (dir.x !== 0) {
                        ctx.fillRect(sx + 2, sy, 1, 1);
                        ctx.fillRect(sx + 2, sy + 3, 1, 1);
                    } else {
                        ctx.fillRect(sx, sy + 2, 1, 1);
                        ctx.fillRect(sx + 3, sy + 2, 1, 1);
                    }
                } else {
                    // Body block - slightly more transparent for that LCD blur
                    ctx.fillStyle = `rgba(43, 58, 26, ${Math.max(0.4, 1 - i * 0.05)})`;
                    ctx.fillRect(sx + 0.5, sy + 0.5, pixelSize - 1, pixelSize - 1);
                }
            });
        }

    </script>
</body>
