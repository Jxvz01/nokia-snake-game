<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nokia Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #4b7500 0%, #000000 100%);
            color: #d7ff5f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 20px;
            letter-spacing: 8px;
            text-shadow: 3px 3px 0px #000;
            font-weight: 900;
        }

        /* Splash Art (Pure CSS replacement for missing image) */
        .splash-art {
            width: 100%;
            height: 180px;
            background: rgba(0, 0, 0, 0.3);
            border: 3px solid #d7ff5f;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 4px;
        }

        .pixel-snake {
            width: 50px;
            height: 50px;
            background: #d7ff5f;
            box-shadow:
                25px 0 0 #d7ff5f, 50px 0 0 #d7ff5f,
                50px 25px 0 #d7ff5f, 50px 50px 0 #d7ff5f,
                25px 50px 0 #d7ff5f, 0 50px 0 #d7ff5f,
                0 75px 0 #d7ff5f;
            animation: float 2s infinite ease-in-out;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .play-btn {
            background: #d7ff5f;
            color: #000;
            border: none;
            padding: 20px 40px;
            font-size: 1.6rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.1s;
            box-shadow: 0 6px 0 #2a4300;
            margin-bottom: 15px;
        }

        .play-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #2a4300;
        }

        /* Settings */
        .settings {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.2);
            padding: 10px;
            font-size: 0.9rem;
        }

        select {
            background: transparent;
            color: #d7ff5f;
            border: 1px solid #d7ff5f;
            padding: 5px;
            font-family: inherit;
        }

        /* Game View */
        #gameView {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
        }

        .game-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 15px;
            font-size: 1.4rem;
            font-weight: bold;
        }

        #gameCanvas {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1/1;
            background: #000;
            border: 4px solid #d7ff5f;
            touch-action: none;
        }

        /* Mobile Controls */
        .mobile-controls {
            display: grid;
            grid-template-areas:
                ". up ."
                "left . right"
                ". down .";
            gap: 15px;
            margin-top: 30px;
        }

        .ctrl-btn {
            width: 70px;
            height: 70px;
            background: rgba(215, 255, 95, 0.1);
            border: 3px solid #d7ff5f;
            color: #d7ff5f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border-radius: 50%;
            cursor: pointer;
        }

        .ctrl-btn:active {
            background: #d7ff5f;
            color: #000;
        }

        .up {
            grid-area: up;
        }

        .down {
            grid-area: down;
        }

        .left {
            grid-area: left;
        }

        .right {
            grid-area: right;
        }

        /* Game Over */
        #gameOverOverlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #gameOverOverlay h2 {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #d7ff5f;
            text-shadow: 0 0 20px rgba(215, 255, 95, 0.5);
        }

        .final-score {
            font-size: 2rem;
            margin-bottom: 40px;
        }
    </style>
</head>

<body>
    <!-- Menu Screen -->
    <div class="container" id="menuScreen">
        <h1>SNAKE</h1>
        <div class="splash-art">
            <div class="pixel-snake"></div>
        </div>

        <div class="settings">
            <div>
                Level:
                <select id="levelSelect">
                    <option value="classic">Classic</option>
                    <option value="teleport">Teleport</option>
                    <option value="walls">Obstacles</option>
                </select>
            </div>
            <div>
                Speed:
                <select id="speedSelect">
                    <option value="easy">Easy</option>
                    <option value="medium" selected>Medium</option>
                    <option value="impossible">Expert</option>
                </select>
            </div>
        </div>

        <button class="play-btn" id="playBtn">START</button>
    </div>

    <!-- Game Screen -->
    <div id="gameView">
        <div class="game-header">
            <span>SCORE: <span id="scoreVal">0</span></span>
            <span>HIGH: <span id="highScore">0</span></span>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="mobile-controls">
            <div class="ctrl-btn up" id="ctrlUp">▲</div>
            <div class="ctrl-btn left" id="ctrlLeft">◀</div>
            <div class="ctrl-btn right" id="ctrlRight">▶</div>
            <div class="ctrl-btn down" id="ctrlDown">▼</div>
        </div>
    </div>

    <!-- Authentic Game Over -->
    <div id="gameOverOverlay">
        <h2>Game over!</h2>
        <div class="final-score">Score: <span id="finalScoreVal">0</span></div>
        <button class="play-btn" id="restartBtn" style="max-width: 300px;">Play Again</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('scoreVal');
        const highScoreEl = document.getElementById('highScore');
        const menuScreen = document.getElementById('menuScreen');
        const gameView = document.getElementById('gameView');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreVal = document.getElementById('finalScoreVal');

        const gridSize = 20;
        let tileCount = 20;

        let snake = [];
        let food = { x: 5, y: 5 };
        let dx = 1;
        let dy = 0;
        let nextDx = 1;
        let nextDy = 0;
        let score = 0;
        let highScore = localStorage.getItem('nokiaSnakeHighScore') || 0;
        let gameRunning = false;
        let level = 'classic';
        let speed = 120;
        let gameLoop = null;

        const obstacles = [
            { x: 5, y: 5 }, { x: 6, y: 5 }, { x: 5, y: 6 },
            { x: 14, y: 14 }, { x: 15, y: 14 }, { x: 14, y: 15 }
        ];

        highScoreEl.textContent = highScore;

        document.getElementById('playBtn').addEventListener('click', initGame);
        document.getElementById('restartBtn').addEventListener('click', () => {
            gameOverOverlay.style.display = 'none';
            initGame();
        });

        window.addEventListener('keydown', e => {
            if (!gameRunning) return;
            if (e.key === 'ArrowUp') setDir(0, -1);
            if (e.key === 'ArrowDown') setDir(0, 1);
            if (e.key === 'ArrowLeft') setDir(-1, 0);
            if (e.key === 'ArrowRight') setDir(1, 0);
        });

        const attachKey = (id, nx, ny) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); setDir(nx, ny); });
            el.addEventListener('mousedown', () => setDir(nx, ny));
        };
        attachKey('ctrlUp', 0, -1);
        attachKey('ctrlDown', 0, 1);
        attachKey('ctrlLeft', -1, 0);
        attachKey('ctrlRight', 1, 0);

        function setDir(nx, ny) {
            if (nx !== 0 && dx !== -nx) { nextDx = nx; nextDy = 0; }
            else if (ny !== 0 && dy !== -ny) { nextDx = 0; nextDy = ny; }
        }

        function initGame() {
            level = document.getElementById('levelSelect').value;
            const sChoice = document.getElementById('speedSelect').value;
            speed = sChoice === 'easy' ? 150 : (sChoice === 'medium' ? 100 : 60);

            score = 0; scoreEl.textContent = '0';
            dx = 1; dy = 0; nextDx = 1; nextDy = 0;
            snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
            spawnFood();

            menuScreen.style.display = 'none';
            gameView.style.display = 'flex';
            gameRunning = true;
            if (gameLoop) clearTimeout(gameLoop);
            loop();
        }

        function loop() {
            if (!gameRunning) return;
            update(); draw();
            gameLoop = setTimeout(loop, speed);
        }

        function spawnFood() {
            let v = false;
            while (!v) {
                food = { x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount) };
                v = !snake.some(s => s.x === food.x && s.y === food.y);
                if (level === 'walls' && obstacles.some(o => o.x === food.x && o.y === food.y)) v = false;
            }
        }

        function update() {
            dx = nextDx; dy = nextDy;
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (level === 'teleport') {
                if (head.x < 0) head.x = tileCount - 1; else if (head.x >= tileCount) head.x = 0;
                if (head.y < 0) head.y = tileCount - 1; else if (head.y >= tileCount) head.y = 0;
            } else if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) return gameOver();

            if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();
            if (level === 'walls' && obstacles.some(o => o.x === head.x && o.y === head.y)) return gameOver();

            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10; scoreEl.textContent = score;
                if (score > highScore) { highScore = score; highScoreEl.textContent = highScore; localStorage.setItem('nokiaSnakeHighScore', highScore); }
                spawnFood();
            } else snake.pop();
        }

        function draw() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Food
            ctx.fillStyle = '#d7ff5f';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            // Obstacles
            if (level === 'walls') {
                ctx.fillStyle = '#444';
                obstacles.forEach(o => {
                    ctx.fillRect(o.x * gridSize + 1, o.y * gridSize + 1, gridSize - 2, gridSize - 2);
                });
            }

            // Snake
            snake.forEach((s, i) => {
                ctx.fillStyle = i === 0 ? '#d7ff5f' : '#888';
                ctx.fillRect(s.x * gridSize + 1, s.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
        }

        function gameOver() {
            gameRunning = false;
            finalScoreVal.textContent = score;
            gameOverOverlay.style.display = 'flex';
        }
    </script>
</body>

</html>
